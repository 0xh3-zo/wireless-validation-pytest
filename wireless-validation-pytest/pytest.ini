[pytest]
minversion = 7.0
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# field_demo tests are deliberately-failing triage inputs; excluded from the
# default (green) suite and selected explicitly by `make demo`.
addopts = -v --strict-markers --tb=short --disable-warnings -m "not field_demo"

markers =
    log_analysis: Tests that analyze protocol logs
    kpi_validation: Tests that validate KPI thresholds
    handover: Tests related to handover analysis
    field_demo: Seeded failing field logs used as triage-agent demo input
    integration: Integration tests requiring external resources
    slow: Tests that take significant time (>5 seconds)
